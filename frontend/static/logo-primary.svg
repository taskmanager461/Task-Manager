<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="20" result="blur"/>
      <feFlood flood-color="#2563EB" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" fill="#000000"/>
  <rect x="72" y="72" width="880" height="880" rx="220" fill="#0A0A0A"/>
  <g fill="none" stroke="#2563EB" stroke-width="64" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <line x1="152" y1="360" x2="872" y2="360"/>
    <line x1="512" y1="380" x2="628.43" y2="927.763"/>
  </g>
</svg>
