<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Task Manager</title>
    <link rel="stylesheet" href="styles.css?v=3.1.0">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/favicon.png">
    <meta name="theme-color" content="#020617">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="light-mode">
    <div id="toast-container" class="toast-container"></div>

    <!-- Auth Page -->
    <div id="auth-page" class="page active">
        <div class="auth-container">
            <h1 class="main-title" data-i18n="app_title">Task Manager</h1>
            <div class="tabs">
                <button id="tab-login" class="tab active" onclick="switchAuthTab('login')" data-i18n="login">Login</button>
                <button id="tab-signup" class="tab" onclick="switchAuthTab('signup')" data-i18n="signup">Sign Up</button>
            </div>
            
            <form id="login-form" class="auth-form active">
                <input type="text" id="login-username" data-i18n="username_email" placeholder="Username or Email" required autocomplete="username">
                <input type="password" id="login-password" data-i18n="password" placeholder="Password" required autocomplete="current-password">
                <button type="submit" class="btn primary" data-i18n="login">Login</button>
            </form>

            <form id="signup-form" class="auth-form">
                <input type="text" id="signup-name" data-i18n="full_name" placeholder="Full Name" required autocomplete="name">
                <input type="text" id="signup-username" data-i18n="username_email" placeholder="Username" required autocomplete="username">
                <input type="email" id="signup-email" data-i18n="email" placeholder="Email" required autocomplete="email">
                <input type="password" id="signup-password" data-i18n="password" placeholder="Password" required autocomplete="new-password">
                <button type="submit" class="btn primary" data-i18n="create_account">Create Account</button>
            </form>
            <div id="auth-error" class="error-msg"></div>
        </div>
    </div>

    <!-- Main App Layout -->
    <div id="main-app" class="page">
        <aside id="sidebar">
            <div class="sidebar-header">
                <img src="/icon-192.png" alt="Logo" class="sidebar-logo">
                <div class="sidebar-info">
                    <h2 data-i18n="app_title">Task Manager</h2>
                    <span id="user-display-name">User</span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" onclick="showView('dashboard')">
                    <span class="nav-icon">🏠</span>
                    <span data-i18n="dashboard">Dashboard</span>
                </button>
                <button class="nav-item" onclick="showView('tasks')">
                    <span class="nav-icon">✅</span>
                    <span data-i18n="tasks">Tasks</span>
                </button>
                <button class="nav-item" onclick="showView('settings')">
                    <span class="nav-icon">⚙️</span>
                    <span data-i18n="settings">Settings</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <button id="install-btn" class="btn secondary" style="display:none">Install App</button>
                <button onclick="logout()" class="btn logout-btn">
                    <span class="nav-icon">🚪</span>
                    <span data-i18n="logout">Logout</span>
                </button>
            </div>
        </aside>

        <main id="content">
            <!-- Dashboard View -->
            <section id="view-dashboard" class="view active">
                <h1 class="view-title" data-i18n="dashboard">Dashboard</h1>
                <div class="metrics-grid">
                    <div class="metric-card">
                        <span class="icon">🎯</span>
                        <span class="label" data-i18n="trust_score">Trust Score</span>
                        <span id="score-value" class="value">0.0</span>
                    </div>
                    <div class="metric-card">
                        <span class="icon">🔥</span>
                        <span class="label" data-i18n="streak">Streak</span>
                        <span id="streak-value" class="value">0</span>
                    </div>
                    <div class="metric-card">
                        <span class="icon">📈</span>
                        <span class="label" data-i18n="success">Success</span>
                        <span id="success-value" class="value">0%</span>
                    </div>
                </div>
                <div class="progress-section">
                    <label data-i18n="daily_progress">Daily Progress</label>
                    <div class="progress-bar"><div id="daily-progress-fill" style="width: 0%"></div></div>
                </div>

                <div class="charts-section">
                    <h2 class="view-subtitle" data-i18n="statistics">Statistics</h2>
                    <div class="chart-container">
                        <h3 data-i18n="task_distribution">Task Distribution</h3>
                        <canvas id="task-pie-chart"></canvas>
                    </div>
                </div>
            </section>

            <!-- Tasks View -->
            <section id="view-tasks" class="view">
                <h1 class="view-title" data-i18n="tasks">Tasks</h1>
                <button onclick="toggleTaskForm()" class="btn primary full-width" data-i18n="add_new_task">+ Add New Task</button>
                
                <div id="task-form-container" class="task-form-modal">
                    <form id="add-task-form">
                        <h3 data-i18n="new_task">New Task</h3>
                        <input type="text" id="task-title" data-i18n="task_placeholder" placeholder="What needs to be done?" required>
                        <div class="form-row">
                            <div class="form-group">
                                <label data-i18n="category">Category</label>
                                <input type="text" id="task-category" placeholder="Work, Health..." value="General">
                            </div>
                            <div class="form-group">
                                <label data-i18n="difficulty">Difficulty</label>
                                <select id="task-difficulty">
                                    <option value="easy" data-i18n="easy">Easy</option>
                                    <option value="medium" data-i18n="medium">Medium</option>
                                    <option value="hard" data-i18n="hard">Hard</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" onclick="toggleTaskForm()" class="btn secondary" data-i18n="cancel">Cancel</button>
                            <button type="submit" class="btn primary" data-i18n="add_task">Add Task</button>
                        </div>
                    </form>
                </div>

                <div id="task-list" class="task-list">
                    <!-- Tasks injected here -->
                </div>
            </section>

            <!-- Settings View -->
            <section id="view-settings" class="view">
                <h1 class="view-title" data-i18n="settings">Settings</h1>
                
                <div class="settings-card">
                    <h3 data-i18n="theme">Theme</h3>
                    <div class="settings-row">
                        <span data-i18n="toggle_dark">Toggle Dark Mode</span>
                        <label class="switch">
                            <input type="checkbox" id="dark-mode-switch" onchange="toggleDarkMode()">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>

                <div class="settings-card">
                    <h3 data-i18n="language">Language</h3>
                    <select id="lang-selector" onchange="changeLanguage(this.value)">
                        <option value="en">English</option>
                        <option value="el">Ελληνικά</option>
                        <option value="es">Español</option>
                        <option value="fr">Français</option>
                        <option value="de">Deutsch</option>
                        <option value="it">Italiano</option>
                        <option value="pt">Português</option>
                    </select>
                </div>

                <div class="settings-card">
                    <h3 data-i18n="app_info">App Info</h3>
                    <p><span data-i18n="version">Version</span>: 3.1.0</p>
                    <button onclick="forceUpdateApp()" class="btn secondary full-width" style="margin-top: 1rem;">Force Update App</button>
                </div>
            </section>
        </main>
    </div>

    <div id="loading-overlay" class="loading-overlay">
        <div class="spinner"></div>
    </div>

    <script src="app.js?v=3.1.0"></script>
</body>
</html>
