services:
  - type: web
    name: task-manager
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python create_branding.py
    startCommand: PYTHONPATH=. uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.9"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SMTP_ENABLED
        value: "false"
      - key: CORS_ORIGINS
        value: "*"
